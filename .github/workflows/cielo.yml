name: Estrai Stream Cielo

on:
  workflow_dispatch

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa Playwright
        run: |
          pip install playwright
          playwright install chromium

      - name: Esegui script
        run: python cielo.py

      - name: Carica risultato
        uses: actions/upload-artifact@v4
        with:
          name: cielo-stream
          path: results.txt
