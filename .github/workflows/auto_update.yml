name: Aggiorna Stream Cielo

on:
  schedule:
    # Esegue lo script ogni 2 ore in automatico
    - cron: '0 */2 * * *'
  workflow_dispatch: # Permette di eseguirlo manualmente

# Aggiungi questa sezione per i permessi
permissions:
  contents: write

jobs:
  extract-stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      - name: Imposta Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installa dipendenze e browser
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps

      - name: Esegui script di estrazione
        run: python extract_stream.py

      - name: Commit e Push del nuovo URL
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add cielo.txt
          git diff --staged --quiet || git commit -m "🔄 Aggiornato URL stream Cielo"
          git push
